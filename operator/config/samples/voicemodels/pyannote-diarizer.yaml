apiVersion: vox.vox.io/v1alpha1
kind: VoiceModel
metadata:
  name: pyannote-diarizer
  namespace: vox
spec:
  model: pyannote/speaker-diarization-3.1
  image: europe-west3-docker.pkg.dev/voxplatform/vox-images-dev/diarizer:0.1.0
  port: 8002
  device: cpu
  replicas: 1
  health:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
