---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inferencepipelines.vox.vox.io
spec:
  group: vox.vox.io
  names:
    kind: InferencePipeline
    listKind: InferencePipelineList
    plural: inferencepipelines
    singular: inferencepipeline
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.message
      name: Message
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InferencePipeline is the Schema for the inferencepipelines API.
          It declares an ordered chain of VoiceModel-backed inference stages
          (STT → diarize → summarize) and tracks their collective readiness.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InferencePipelineSpec defines the desired state of an InferencePipeline.
              A pipeline is an ordered chain of VoiceModel-backed inference steps.
              The operator validates that all referenced VoiceModels exist and are Ready;
              the gateway executes the stages at request time using their service endpoints.
            properties:
              stages:
                description: |-
                  Stages is the ordered list of inference steps.
                  Supported names: "stt", "diarize", "summarize".
                  The order determines execution sequence at runtime.
                items:
                  description: PipelineStage maps one inference step to a VoiceModel
                    in the same namespace.
                  properties:
                    enabled:
                      default: true
                      description: |-
                        Enabled controls whether this stage runs at request time.
                        A disabled stage is skipped; its VoiceModel is still validated.
                      type: boolean
                    model:
                      description: |-
                        Model is the name of a VoiceModel resource in the same namespace.
                        The operator watches this VoiceModel and reflects its readiness here.
                      type: string
                    name:
                      description: Name identifies this stage type.
                      enum:
                      - stt
                      - diarize
                      - summarize
                      type: string
                  required:
                  - model
                  - name
                  type: object
                minItems: 1
                type: array
            required:
            - stages
            type: object
          status:
            description: InferencePipelineStatus defines the observed state of an
              InferencePipeline.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes conditions
                  pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastTransitionTime:
                description: LastTransitionTime records when Phase last changed.
                format: date-time
                type: string
              message:
                description: Message provides human-readable status details, e.g.
                  "3/3 stages ready".
                type: string
              phase:
                description: |-
                  Phase is the current lifecycle phase of the pipeline.
                  Ready = all enabled stages have a Ready VoiceModel.
                  Degraded = some stages are ready, others are not.
                  Failed = a referenced VoiceModel does not exist.
                enum:
                - Pending
                - Validating
                - Ready
                - Degraded
                - Failed
                type: string
              stages:
                description: Stages shows the readiness of each stage's backing VoiceModel.
                items:
                  description: PipelineStageStatus reflects the readiness of one stage's
                    backing VoiceModel.
                  properties:
                    endpoint:
                      description: |-
                        Endpoint is the internal K8s service address resolved from VoiceModel status.
                        Format: <service>.<namespace>.svc.cluster.local:<port>
                      type: string
                    message:
                      description: Message explains why the stage is or is not ready.
                      type: string
                    modelRef:
                      description: ModelRef is the VoiceModel name this stage points
                        to.
                      type: string
                    name:
                      description: Name of the pipeline stage (stt, diarize, summarize).
                      type: string
                    ready:
                      description: Ready is true when the referenced VoiceModel is
                        in Ready phase.
                      type: boolean
                  required:
                  - modelRef
                  - name
                  - ready
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
